.aqua {

  font-family: "Lucida Grande";

  box-shadow: 0px 5px 10px;
  
}

.aqua:before {
  content:" ";
	display:block;
	position:absolute;
	top:1px;
	left:4px;
	right:4px;
	bottom:15px;
  filter: blur(0.2px);
	border-radius: 300px 300px 80px 80px;
  background: linear-gradient(180deg, rgba(204,208,232,1), rgba(125,174,221,1));
  z-index: -1;
}

.aqua:after {
  content:" ";
	display:block;
	position:absolute;
	top:22px;
	left:8px;
	right:8px;
	bottom:2px;
  opacity: 50%;
  filter: blur(1px);
	border-radius:  400px 400px 400px 400px;
  background: linear-gradient(180deg, #bde1ff, #cff8ff 60%);
  z-index: -1;
}
